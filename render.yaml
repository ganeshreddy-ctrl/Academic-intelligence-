# Render Blueprint for the AIP MCP server (remote custom connector for Claude.ai).
# Deploy: push to GitHub, then New > Blueprint on Render and point it at this repo.
# Connector URL after deploy:  https://<service>.onrender.com/mcp
services:
  - type: web
    name: aip-mcp
    runtime: python
    plan: free                      # free tier sleeps after 15 min idle -> cold start
    buildCommand: "pip install -r requirements-mcp.txt && python scripts/load_duckdb.py"
    startCommand: "python mcp_server.py --http"
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"             # stable wheels for duckdb/mcp (local 3.14 is too new)
      # NO AIP_MCP_TOKEN on purpose -> the server runs OPEN, which is what Claude.ai
      # custom connectors require (they use OAuth, not a pasted token). This repo's
      # data is already public, so an open read-only endpoint exposes nothing new.
      # To lock it down for non-Claude clients (Cursor etc. that CAN send a header),
      # add AIP_MCP_TOKEN here and send it as  Authorization: Bearer <token>.
